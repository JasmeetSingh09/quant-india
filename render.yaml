# Render Blueprint — deploy the backend.
# Note: FinBERT needs ~1.5GB RAM, so the "standard" plan (2GB) is required.
# The free/starter (512MB) plans will crash on model load.

services:
  - type: web
    name: quant-india-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: standard          # 2 GB RAM — needed for FinBERT
    healthCheckPath: /
    envVars:
      - key: NEWS_API_KEY
        sync: false         # set in Render dashboard (secret)
      - key: GMAIL_ADDRESS
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: GMAIL_RECEIVER
        sync: false
      - key: FRONTEND_URL
        sync: false         # set to your Vercel URL
